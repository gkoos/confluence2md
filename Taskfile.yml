version: '3'

tasks:
  build:
    desc: Build the binary
    cmds:
      - go build -o bin/confluence2md{{exeExt}} ./cmd/crawler

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy
